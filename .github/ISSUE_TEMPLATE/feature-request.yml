name: 🎁 Feature Request
description: Suggest an improvement for the macOS app
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea.
        Please focus on the user problem, the proposed improvement, and the expected value.

  - type: textarea
    id: summary
    attributes:
      label: Feature summary
      description: Short description of the requested feature
      placeholder: Describe the feature in one or two sentences
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What user problem or limitation does this request address?
      placeholder: I am frustrated when ...
    validations:
      required: true

  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed solution
      description: Describe the change you would like to see
      placeholder: The app should support ...
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: Expected impact
      description: How valuable would this feature be?
      options:
        - High - unlocks an important workflow
        - Medium - meaningful improvement
        - Low - nice to have
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Product area
      description: Which part of the macOS app does this relate to?
      options:
        - Onboarding
        - App updates
        - Search
        - UI / UX
        - Performance
        - Notifications
        - Settings
        - Integrations
        - Accessibility
        - Other
    validations:
      required: true

  - type: textarea
    id: mockups
    attributes:
      label: Mockups, references, or examples
      description: Add links, screenshots, sketches, or examples from other apps if helpful
      placeholder: Paste links or attach images here

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Anything else that would help evaluate this request
      placeholder: Technical constraints, edge cases, related issues, etc.