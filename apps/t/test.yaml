app_token: "test"
name: "Test"
name_cn: "测试"
desc: "A test application"
homepage: "https://www.test.org"
bundle_id: "com.test.app"

deprecated: true
deprecated_note: "Just a test app"

sources:
  - type: homebrew
    cask: "visual-studio-code"

  - type: homebrew
    tap: "tw93/tap"
    cask: "kakuku"

  - type: github
    repo: "insidegui/WWDC"

  - type: github
    repo: "bitwarden/clients"
    regex: "^Bitwarden-(\\d+\\.\\d+\\.\\d+)-universal\\.dmg$"

  - type: github
    repo: "bitwarden/clients"
    regex: "^Bitwarden-(\\d+\\.\\d+\\.\\d+)-universal\\.dmg$"
    version: "{match[1]}"

  - type: sparkle
    url: "https://www.iina.io/appcast.xml"

  - type: electron_builder
    url: "https://api.k8slens.dev/binaries/latest-mac.yml"

  - type: page_match
    url: "https://www.apachefriends.org/download.html"
    regex: "href=.*?/xampp[._-]osx[._-]v?(\\d+(?:\\.\\d+)+-\\d+)[._-]installer\\.dmg"
    version: "{match[1]}"
    download: "https://downloads.sourceforge.net/xampp/xampp-osx-{match[1]}-installer.dmg"

  - type: page_match
    url: "https://sourceforge.net/projects/xampp/rss?path=/XAMPP%20Mac%20OS%20X"
    regex: "<link>(https:.+?xampp-osx-(\\d+\\.\\d+\\.\\d+)-\\d+-installer\\.dmg/download)<\/link>"
    version: "{match[1]}"
    download: "{match[2]}"

  - type: page_match
    url: "https://raw.githubusercontent.com/hoakleyelc/updates/master/eclecticapps.plist"
    regex: "<key>Version<\\/key>\\s*<string>(.*?)<\\/string>.*?<key>URL<\\/key>\\s*<string>(.*?)<\\/string>"
    version: "{match[1]}"
    download: "{match[2]}"

  - type: page_match
    url: "https://hub.digi.com/support/products/xctu/"
    regex: "href=\"[^\"]*xctu-v-(\\d+)-macos-x[^\"]*\".*?v\\.\\s*(\\d+\\.\\d+\\.\\d+)"
    version: "{match[2]}"
    download: "https://hub.digi.com/dp/path=/support/asset/xctu-v-{match[1]}-macos-x/"

  - type: header_match
    url: "https://www.xmind.net/zen/download/mac/"
    regex: "/XMind[._-]for[._-]macOS[._-](\\d+(?:[.-]\\d+)+)-(\\d+)\\.dmg"
    version: "{match[1]}"
    download: "https://dl3.xmind.net/Xmind-for-macOS-{match[1]}-beta-{match[2]}.dmg"